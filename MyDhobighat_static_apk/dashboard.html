<!DOCTYPE html>
<html>
<head>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="js/config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
</head>

<body class="bg-gray-100 flex justify-center items-center h-screen">

<div class="bg-white p-6 rounded shadow w-96">
    <!-- <button onclick="logout()"
        class="mt-4 bg-red-500 text-white p-2 rounded w-full">
        Logout
    </button> -->
  <h2 class="text-xl font-bold mb-4">Place Laundry Order</h2>

    <h3 class="mb-3 text-blue-700 font-semibold">
        Selected Service: <span id="serviceName"></span>
    </h3>


  <input id="name" placeholder="Name"
    class="w-full mb-2 p-2 border rounded">

  <input id="phone" placeholder="Phone"
    class="w-full mb-2 p-2 border rounded">

  <input id="address" placeholder="Address"
    class="w-full mb-2 p-2 border rounded">

  <textarea id="details" placeholder="Laundry Details"
    class="w-full mb-4 p-2 border rounded"></textarea>

  <button onclick="placeOrder()"
    class="w-full bg-green-500 text-white p-2 rounded">
    Place Order
  </button>
</div>

<script src="js/dashboard.js"></script>

</body>
</html>
